default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5
  username: <%= ENV['POSTGRES_USER'] || 'postgres' %>
  password: <%= ENV['POSTGRES_PASSWORD'] || 'password' %>
  host: postgres
  port: 5432

development:
  <<: *default
  database: permieportal_development

test:
  <<: *default
  database: permieportal_test

production:
  <<: *default
  database: permieportal_production

